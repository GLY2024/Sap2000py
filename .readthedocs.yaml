# Read the Docs configuration. https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

mkdocs:
  configuration: mkdocs.yml

# Install the package (so mkdocstrings can import and introspect it — the
# package imports cleanly on Linux without comtypes) plus the docs tooling.
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
