site_name: Sap2000py
site_description: A Pythonic SAP2000 OAPI wrapper for structural and bridge engineering.
repo_url: https://github.com/GLY2024/Sap2000py
repo_name: GLY2024/Sap2000py

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Migration from v0: migration-from-v0.md
  - Architecture: architecture.md
  - Guides:
      - Connecting to SAP2000: guides/connecting.md
      - Building and analyzing models: guides/building-models.md
      - Units: guides/units.md
      - Static checking & IDE completion: guides/typing.md
      - The native API escape hatch: guides/native-api.md
      - Fiber moment-curvature: guides/fiber.md
      - Bridge components: guides/bridge.md
  - API reference:
      - Client & connection: reference/client.md
      - Model: reference/model.md
      - Native API & gateway: reference/native.md
      - Errors: reference/errors.md
      - Enums & values: reference/enums.md
      - Handles: reference/handles.md
      - Fiber: reference/fiber.md
      - Yield surface: reference/yield-surface.md
      - Bridge: reference/bridge.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: false
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true
