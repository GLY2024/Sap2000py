name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # Pin the lint interpreter: the locked dependency set (and its type
          # stubs) varies with the resolver's Python, so an unpinned runner
          # can drift from the version mypy is validated against.
          python-version: "3.13"
      - name: Sync (dev)
        run: uv sync --dev
      - name: Ruff
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy (strict)
        run: uv run mypy

  test:
    # Unit tests only: integration tests need a real local SAP2000 (Windows,
    # licensed) and run as a pre-release manual gate, not in CI.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (dev)
        run: uv sync --dev
      - name: Unit tests
        run: uv run pytest tests/unit -q
